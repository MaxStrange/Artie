[EXPERIMENT]
# The importable path to execute in order to run this experiment
function = experiments.language.experiments.thesis_dsp.run

# The name of the experiment
name = thesis_with_dsp

# Random seed for reproduceability
random-seed = 1234

# Root directory where we will put all the result folders
save-root = ~/repos/Artie/results

[ARTIE]
# What type of input will the audio come from?
audio-source-type = files

# Where will we be getting audio input for Artie?
audio-source = ~/Dropbox/Artie

[PREPROCESS_SIGNAL]
# What functions should we apply as part of preprocessing the signal?
# This is a chain of DSP functions that we apply to the list of sounds
# we have gathered from 'ARTIE:audio-source'
functions = []

# A list of arg lists for each function
# args[i] should be a list of arguments that we pass to functions[i]
args = []

# A list of kwarg dicts for each function
# kwargs[i] should be a list of keyword arguments that we pass to functions[i]
kwargs = []
